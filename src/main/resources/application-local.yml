spring:  
  liquibase:
    contexts: local
    
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
    hikari:
      maximum-pool-size: 2
      minimum-idle: 2

  jpa:
    show-sql: true

logging:
  level:
    org.apache.tomcat: INFO
    org.hibernate.orm.jdbc.bind: DEBUG

app:
  jwt:
    private-key-path: keys/private.pem
    public-key-path: keys/public.pem

  cors:
    allowed-origins:
      - http://localhost:3000