spring:
  application:
    name: auditflow

  docker:
    compose:
      enabled: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  shutdown: graceful
  error:
    whitelabel:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

management.endpoint.health:
  show-details: when_authorized
  probes:
    enabled: true

logging:
  level:
    root: INFO
    org.springframework.security: TRACE
    liquibase: INFO

app:
  storage:
    provider: local
    path: data/uploads
    max-file-size-mb: 20

    allowed-content-types:
      - image/png
      - image/jpeg
      - application/pdf
  jwt:
    issuer: auditflow
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 30

    private-key-path: ${JWT_PRIVATE_KEY_PATH}
    public-key-path: ${JWT_PUBLIC_KEY_PATH}

  cors:
    allowed-origins:
      - http://localhost:3000
